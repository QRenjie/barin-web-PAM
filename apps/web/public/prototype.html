<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>公司项目展示 | 卡片 & 精简列表双视图 · 全响应式</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'sans': ['Inter', 'system-ui', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'sans-serif'],
          },
          screens: {
            'xs': '480px',
          },
          animation: {
            'fade-in': 'fadeIn 0.25s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(6px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    html {
      scroll-behavior: smooth;
      -webkit-tap-highlight-color: transparent;
    }

    .card-hover {
      transition: all 0.2s ease;
    }

    .card-hover:active {
      transform: scale(0.98);
    }

    .compact-item-hover {
      transition: background 0.15s;
    }

    .compact-item-hover:active {
      background-color: #f3f4f6;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-slate-50 via-gray-50 to-blue-50/30 font-sans antialiased">
  <div class="max-w-7xl mx-auto px-4 sm:px-5 lg:px-8 py-5 md:py-10">
    <!-- 头部区域 - 移动端优化堆叠 -->
    <div class="mb-6 md:mb-8 flex flex-col items-start gap-4 md:flex-row md:justify-between md:items-end">
      <div class="w-full">
        <div
          class="inline-flex items-center gap-2 bg-white/70 backdrop-blur-sm rounded-full px-3 py-1 shadow-sm border border-gray-200/80 mb-3">
          <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
          </span>
          <span class="text-[11px] md:text-xs font-medium text-gray-600 tracking-wide">资产总览 · 双模视图</span>
        </div>
        <h1
          class="text-2xl md:text-4xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-slate-800 to-slate-600">
          项目资产中心</h1>
        <p class="text-gray-500 mt-1 max-w-xl text-xs md:text-sm">仓库地址 · 测试/正式环境 · 负责人信息 · 支持卡片/精简列表快速切换</p>
      </div>
      <div class="flex flex-wrap items-center gap-3 w-full md:w-auto justify-between md:justify-end">
        <div
          class="bg-white/70 backdrop-blur-sm rounded-2xl px-4 py-1.5 shadow-sm border border-gray-100 flex items-center gap-3">
          <div class="text-left">
            <div class="text-[10px] md:text-xs text-gray-500 font-medium">项目总数</div>
            <div class="text-xl md:text-2xl font-bold text-gray-800" id="totalProjectCount">0</div>
          </div>
          <div class="h-6 w-px bg-gray-200"></div>
          <div class="text-left">
            <div class="text-[10px] md:text-xs text-gray-500 font-medium">当前筛选</div>
            <div class="text-xl md:text-2xl font-bold text-emerald-600" id="filteredCount">0</div>
          </div>
        </div>
        <div class="flex bg-white/80 backdrop-blur-sm rounded-xl border border-gray-200 p-0.5 shadow-sm">
          <button id="cardViewBtn"
            class="flex items-center gap-1 px-3 py-1.5 text-xs md:text-sm font-medium rounded-lg transition-all duration-200 bg-emerald-50 text-emerald-700 shadow-sm">
            <svg class="w-3.5 h-3.5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
            </svg>
            <span>卡片</span>
          </button>
          <button id="compactViewBtn"
            class="flex items-center gap-1 px-3 py-1.5 text-xs md:text-sm font-medium rounded-lg transition-all duration-200 text-gray-600 hover:bg-gray-100">
            <svg class="w-3.5 h-3.5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
            <span>精简列表</span>
          </button>
        </div>
      </div>
    </div>

    <div class="mb-5 flex flex-col sm:flex-row gap-2 items-stretch sm:items-center justify-between">
      <div class="relative flex-1 w-full">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <svg class="h-4 w-4 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
          </svg>
        </div>
        <input type="text" id="searchInput" placeholder="搜索项目名称、作者、描述或技术栈..."
          class="block w-full pl-9 pr-3 py-2.5 border border-gray-200 rounded-xl bg-white/90 shadow-sm focus:ring-2 focus:ring-emerald-500/30 focus:border-emerald-400 transition-all text-sm">
      </div>
      <div
        class="text-[11px] text-gray-400 bg-white/50 px-3 py-1.5 rounded-full inline-flex items-center justify-center gap-1 whitespace-nowrap">
        <span>🔍 模糊匹配 · 实时过滤</span>
      </div>
    </div>

    <!-- 卡片视图容器 (详细卡片，网格) -->
    <div id="cardsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 auto-rows-fr">
    </div>

    <!-- 精简列表视图容器 (优化移动端布局，按钮等宽填充) -->
    <div id="compactContainer" class="hidden space-y-3">
    </div>

    <div id="emptyState"
      class="hidden text-center py-12 flex flex-col items-center justify-center bg-white/40 rounded-2xl mt-5 backdrop-blur-sm">
      <div class="bg-gray-100 rounded-full p-3 mb-2">
        <svg class="h-8 w-8 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <p class="text-gray-500 font-medium">没有找到匹配的项目</p>
      <p class="text-gray-400 text-xs mt-1">尝试调整关键词或清空筛选</p>
      <button id="resetSearchBtnEmpty"
        class="mt-3 text-sm bg-emerald-50 text-emerald-700 px-4 py-1.5 rounded-full hover:bg-emerald-100 transition">清空筛选</button>
    </div>

    <footer
      class="mt-12 pt-5 border-t border-gray-200/60 text-center text-[10px] md:text-xs text-gray-400 flex flex-wrap justify-center gap-x-4 gap-y-1">
      <span>📁 仓库 + 测试/正式环境一键直达</span>
      <span>🔄 详细卡片 / 精简列表双模式</span>
      <span>📱 完美适配移动端</span>
    </footer>
  </div>

  <script>
    const projectsData = [
      { id: 1, name: "营销自动化平台", repoUrl: "https://github.com/company/marketing-automation", testUrl: "https://test-marketing.insight.cn", prodUrl: "https://marketing.insight.cn", author: "陈雅琳", otherInfo: "⚙️ Next.js + NestJS · 多渠道触达 · 更新 2025-02", description: "全渠道营销自动化引擎，支持邮件/SMS/企微集成", tags: ["营销", "自动化"] },
      { id: 2, name: "库存智能管理系统", repoUrl: "https://github.com/company/inventory-master", testUrl: "https://test-inventory.insight.cn", prodUrl: "https://inventory.insight.cn", author: "张明远", otherInfo: "📦 Spring Boot + Redis + React · 实时预警 v3.1", description: "多仓实时库存追踪，预测补货与智能调拨", tags: ["库存", "IoT"] },
      { id: 3, name: "员工自助服务门户", repoUrl: "https://github.com/company/hr-portal", testUrl: "https://test-hr.insight.cn", prodUrl: "https://hr.insight.cn", author: "李心怡", otherInfo: "👥 Vue3 + .NET 8 · 工资单/假期/审批流 · SSO", description: "一体化HR服务台，覆盖入职、考勤与福利申请", tags: ["HR", "Vue"] },
      { id: 4, name: "API 网关与控制台", repoUrl: "https://github.com/company/api-gateway-console", testUrl: "https://test-gateway.insight.cn", prodUrl: "https://gateway.insight.cn", author: "王旭东", otherInfo: "🌐 Go + Envoy + gRPC · 限流/鉴权/监控", description: "统一流量入口，服务治理与可视化路由管理", tags: ["网关", "云原生"] },
      { id: 5, name: "数据分析平台 (BI)", repoUrl: "https://github.com/company/bi-dashboard", testUrl: "https://test-bi.insight.cn", prodUrl: "https://bi.insight.cn", author: "周敏", otherInfo: "📊 Apache Superset + Python FastAPI · 自助报表", description: "企业级BI看板，连接数仓支持动态下钻", tags: ["BI", "大数据"] },
      { id: 6, name: "项目协同工作台", repoUrl: "https://github.com/company/team-collab", testUrl: "https://test-collab.insight.cn", prodUrl: "https://collab.insight.cn", author: "赵一航", otherInfo: "🤝 React + Node + MongoDB · 任务/Gantt · 飞书", description: "研发全生命周期协同，OKR与迭代追踪", tags: ["协作", "敏捷"] }
    ];

    const cardsContainer = document.getElementById('cardsContainer');
    const compactContainer = document.getElementById('compactContainer');
    const searchInput = document.getElementById('searchInput');
    const emptyStateDiv = document.getElementById('emptyState');
    const totalCountSpan = document.getElementById('totalProjectCount');
    const filteredCountSpan = document.getElementById('filteredCount');
    const resetBtnEmpty = document.getElementById('resetSearchBtnEmpty');
    const cardViewBtn = document.getElementById('cardViewBtn');
    const compactViewBtn = document.getElementById('compactViewBtn');

    let currentView = 'card';
    let currentFilterText = '';

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
    }

    function formatShortUrl(url, maxLen = 35) {
      if (!url) return '';
      try {
        let urlObj = new URL(url);
        let short = urlObj.hostname + (urlObj.pathname !== '/' ? urlObj.pathname : '');
        return short.length > maxLen ? short.substring(0, maxLen) + '…' : short;
      } catch (e) {
        let raw = url.replace(/^https?:\/\//, '');
        return raw.length > maxLen ? raw.substring(0, maxLen) + '…' : raw;
      }
    }

    function filterProjects(term) {
      if (!term.trim()) return [...projectsData];
      const lowerTerm = term.trim().toLowerCase();
      return projectsData.filter(p =>
        p.name.toLowerCase().includes(lowerTerm) ||
        p.author.toLowerCase().includes(lowerTerm) ||
        p.description.toLowerCase().includes(lowerTerm) ||
        p.otherInfo.toLowerCase().includes(lowerTerm) ||
        (p.tags && p.tags.some(t => t.toLowerCase().includes(lowerTerm))) ||
        (p.repoUrl && p.repoUrl.toLowerCase().includes(lowerTerm)) ||
        (p.prodUrl && p.prodUrl.toLowerCase().includes(lowerTerm)) ||
        (p.testUrl && p.testUrl.toLowerCase().includes(lowerTerm))
      );
    }

    function renderDetailCard(project) {
      const repoLink = project.repoUrl ?
        `<a href="${project.repoUrl}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 text-indigo-600 hover:text-indigo-800 transition text-xs md:text-sm font-medium bg-indigo-50/60 px-2 py-1 rounded-md break-all">
                    <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                    <span class="truncate">${escapeHtml(formatShortUrl(project.repoUrl, 40))}</span>
                </a>` : `<span class="text-gray-400 text-xs">🔗 无仓库</span>`;
      const testLink = project.testUrl ?
        `<a href="${project.testUrl}" target="_blank" class="inline-flex items-center gap-1 text-amber-600 hover:text-amber-800 text-xs md:text-sm bg-amber-50/60 px-2 py-1 rounded-md break-all"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span class="truncate">${escapeHtml(formatShortUrl(project.testUrl, 30))}</span></a>` : `<span class="text-gray-400 text-xs">🚧 未配置</span>`;
      const prodLink = project.prodUrl ?
        `<a href="${project.prodUrl}" target="_blank" class="inline-flex items-center gap-1 text-emerald-600 hover:text-emerald-800 text-xs md:text-sm bg-emerald-50/60 px-2 py-1 rounded-md break-all"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M5 13l4 4L19 7"></path></svg><span class="truncate">${escapeHtml(formatShortUrl(project.prodUrl, 30))}</span></a>` : `<span class="text-gray-400 text-xs">🔒 未配置</span>`;
      const tagBadges = project.tags?.length ? `<div class="flex flex-wrap gap-1.5 mt-1">${project.tags.map(t => `<span class="text-[10px] md:text-xs font-medium bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">${escapeHtml(t)}</span>`).join('')}</div>` : '';
      return `<div class="bg-white/90 backdrop-blur-sm rounded-xl md:rounded-2xl border border-gray-200/80 shadow-sm overflow-hidden flex flex-col h-full transition-all duration-200 card-hover animate-fade-in">
                        <div class="p-3 md:p-5 pb-2 md:pb-3 border-b border-gray-100">
                            <div class="flex justify-between items-start gap-1"><h3 class="text-base md:text-xl font-bold text-gray-800 leading-tight">${escapeHtml(project.name)}</h3><span class="bg-gray-50 rounded-full px-1.5 py-0.5 text-[10px] md:text-xs text-gray-500">#${project.id}</span></div>
                            <div class="flex items-center gap-1 mt-1.5 text-xs md:text-sm text-gray-600"><svg class="w-3 h-3 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg><span class="font-medium">${escapeHtml(project.author)}</span></div>
                            <p class="text-xs md:text-sm text-gray-500 mt-1.5 leading-relaxed">📋 ${escapeHtml(project.description)}</p>${tagBadges}
                        </div>
                        <div class="px-3 md:px-5 pt-2 pb-2 space-y-2 flex-1">
                            <div><div class="text-[10px] md:text-xs font-semibold text-gray-500 mb-0.5">📂 代码仓库</div>${repoLink}</div>
                            <div class="grid grid-cols-1 xs:grid-cols-2 gap-2"><div class="bg-amber-50/30 rounded-lg p-1.5 md:p-2 border border-amber-100/50"><div class="text-[10px] md:text-xs font-medium text-amber-700 mb-0.5">🧪 测试环境</div>${testLink}</div><div class="bg-emerald-50/30 rounded-lg p-1.5 md:p-2 border border-emerald-100/50"><div class="text-[10px] md:text-xs font-medium text-emerald-700 mb-0.5">🚀 正式环境</div>${prodLink}</div></div>
                            <div class="mt-1 pt-1.5 border-t border-gray-100 bg-gray-50/50 rounded-lg p-2 text-[10px] md:text-xs leading-relaxed">📌 ${escapeHtml(project.otherInfo)}</div>
                        </div>
                        <div class="px-3 md:px-5 pb-3 pt-0 text-right text-[10px] text-gray-400">🔗 点击链接新窗口访问</div>
                    </div>`;
    }

    // 重点优化：精简列表项，移动端按钮等宽填充，消除右侧空白
    function renderCompactItem(project) {
      const repoButton = project.repoUrl ?
        `<a href="${project.repoUrl}" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center gap-1 md:gap-1.5 text-indigo-600 hover:text-indigo-800 bg-indigo-50/70 hover:bg-indigo-100 py-1.5 md:py-1.5 rounded-lg text-xs md:text-sm transition w-full">
                    <svg class="w-3.5 h-3.5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                    <span class="hidden sm:inline">仓库</span>
                </a>` :
        `<span class="flex items-center justify-center gap-1 text-gray-400 bg-gray-100 py-1.5 rounded-lg text-xs w-full"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg><span class="hidden sm:inline">无仓库</span></span>`;
      const testButton = project.testUrl ?
        `<a href="${project.testUrl}" target="_blank" class="flex items-center justify-center gap-1 md:gap-1.5 text-amber-600 hover:text-amber-800 bg-amber-50/70 hover:bg-amber-100 py-1.5 rounded-lg text-xs md:text-sm transition w-full">
                    <svg class="w-3.5 h-3.5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span class="hidden sm:inline">测试</span>
                </a>` :
        `<span class="flex items-center justify-center gap-1 text-gray-400 bg-gray-100 py-1.5 rounded-lg text-xs w-full"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span class="hidden sm:inline">无测试</span></span>`;
      const prodButton = project.prodUrl ?
        `<a href="${project.prodUrl}" target="_blank" class="flex items-center justify-center gap-1 md:gap-1.5 text-emerald-600 hover:text-emerald-800 bg-emerald-50/70 hover:bg-emerald-100 py-1.5 rounded-lg text-xs md:text-sm transition w-full">
                    <svg class="w-3.5 h-3.5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M5 13l4 4L19 7"></path></svg>
                    <span class="hidden sm:inline">正式</span>
                </a>` :
        `<span class="flex items-center justify-center gap-1 text-gray-400 bg-gray-100 py-1.5 rounded-lg text-xs w-full"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M5 13l4 4L19 7"></path></svg><span class="hidden sm:inline">未配置</span></span>`;

      let shortInfo = project.otherInfo.substring(0, 60);
      if (project.otherInfo.length > 60) shortInfo += '…';

      return `
                <div class="bg-white/80 backdrop-blur-sm rounded-xl border border-gray-200 shadow-sm p-3 md:p-4 compact-item-hover transition animate-fade-in">
                    <div class="flex flex-col gap-2">
                        <!-- 头部：名称和作者 -->
                        <div class="flex flex-wrap items-baseline justify-between gap-1">
                            <div class="flex items-center gap-2 flex-wrap">
                                <h3 class="text-sm md:text-base font-bold text-gray-800">${escapeHtml(project.name)}</h3>
                                <span class="text-[10px] bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded-full">#${project.id}</span>
                            </div>
                            <div class="flex items-center gap-1 text-xs text-gray-500">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                                <span>${escapeHtml(project.author)}</span>
                            </div>
                        </div>
                        <!-- 移动端标签和简短信息 -->
                        <div class="flex flex-wrap gap-1 mt-0 sm:hidden">
                            ${project.tags?.slice(0, 2).map(t => `<span class="text-[9px] bg-gray-100 text-gray-600 px-1.5 py-0.2 rounded-full">${escapeHtml(t)}</span>`).join('')}
                            <span class="text-[10px] text-gray-400 truncate">${escapeHtml(shortInfo)}</span>
                        </div>
                        <div class="hidden sm:block text-[11px] text-gray-400 truncate">📄 ${escapeHtml(project.description.substring(0, 80))}</div>
                        <!-- 三按钮等宽网格，移动端完全填满，无右侧空白 -->
                        <div class="grid grid-cols-3 gap-2 mt-1">
                            ${repoButton}
                            ${testButton}
                            ${prodButton}
                        </div>
                    </div>
                </div>`;
    }

    function updateUI() {
      const filtered = filterProjects(currentFilterText);
      totalCountSpan.innerText = projectsData.length;
      filteredCountSpan.innerText = filtered.length;
      if (filtered.length === 0) {
        emptyStateDiv.classList.remove('hidden');
        cardsContainer.classList.add('hidden');
        compactContainer.classList.add('hidden');
        return;
      }
      emptyStateDiv.classList.add('hidden');
      if (currentView === 'card') {
        cardsContainer.classList.remove('hidden');
        compactContainer.classList.add('hidden');
        cardsContainer.innerHTML = '';
        filtered.forEach(p => cardsContainer.insertAdjacentHTML('beforeend', renderDetailCard(p)));
      } else {
        cardsContainer.classList.add('hidden');
        compactContainer.classList.remove('hidden');
        compactContainer.innerHTML = '';
        filtered.forEach(p => compactContainer.insertAdjacentHTML('beforeend', renderCompactItem(p)));
      }
    }

    function onSearch() { currentFilterText = searchInput.value; updateUI(); }
    function setView(view) {
      currentView = view;
      if (view === 'card') {
        cardViewBtn.classList.add('bg-emerald-50', 'text-emerald-700', 'shadow-sm');
        cardViewBtn.classList.remove('text-gray-600', 'hover:bg-gray-100');
        compactViewBtn.classList.remove('bg-emerald-50', 'text-emerald-700', 'shadow-sm');
        compactViewBtn.classList.add('text-gray-600', 'hover:bg-gray-100');
      } else {
        compactViewBtn.classList.add('bg-emerald-50', 'text-emerald-700', 'shadow-sm');
        compactViewBtn.classList.remove('text-gray-600', 'hover:bg-gray-100');
        cardViewBtn.classList.remove('bg-emerald-50', 'text-emerald-700', 'shadow-sm');
        cardViewBtn.classList.add('text-gray-600', 'hover:bg-gray-100');
      }
      updateUI();
    }
    function resetSearch() { searchInput.value = ''; currentFilterText = ''; updateUI(); }
    function init() {
      searchInput.addEventListener('input', onSearch);
      resetBtnEmpty.addEventListener('click', resetSearch);
      cardViewBtn.addEventListener('click', () => setView('card'));
      compactViewBtn.addEventListener('click', () => setView('compact'));
      setView('card');
    }
    init();
  </script>
</body>

</html>
