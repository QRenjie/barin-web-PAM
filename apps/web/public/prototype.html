<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>项目资产中心 | 支持CURD管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'sans': ['Inter', 'system-ui', 'Segoe UI', 'Roboto', 'sans-serif'] },
                    screens: { 'xs': '480px' },
                    animation: { 'fade-in': 'fadeIn 0.25s ease-out' },
                    keyframes: { fadeIn: { '0%': { opacity: '0', transform: 'translateY(6px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
        .card-hover { transition: all 0.2s ease; }
        .card-hover:active { transform: scale(0.98); }
        .compact-item-hover { transition: background 0.15s; }
        .modal-backdrop { background-color: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-gray-50 to-blue-50/30 font-sans antialiased">
    <div class="max-w-7xl mx-auto px-4 sm:px-5 lg:px-8 py-5 md:py-10">
        <!-- 头部区域 -->
        <div class="mb-6 md:mb-8 flex flex-col items-start gap-4 md:flex-row md:justify-between md:items-end">
            <div class="w-full">
                <div class="inline-flex items-center gap-2 bg-white/70 backdrop-blur-sm rounded-full px-3 py-1 shadow-sm border border-gray-200/80 mb-3">
                    <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></span>
                    <span class="text-[11px] md:text-xs font-medium text-gray-600 tracking-wide">资产总览 · 双模视图 · 完整CURD</span>
                </div>
                <h1 class="text-2xl md:text-4xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-slate-800 to-slate-600">项目资产中心</h1>
                <p class="text-gray-500 mt-1 max-w-xl text-xs md:text-sm">仓库地址 · 测试/正式环境 · 支持增删改查，数据本地存储</p>
            </div>
            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto justify-between md:justify-end">
                <div class="bg-white/70 backdrop-blur-sm rounded-2xl px-4 py-1.5 shadow-sm border border-gray-100 flex items-center gap-3">
                    <div class="text-left"><div class="text-[10px] md:text-xs text-gray-500 font-medium">项目总数</div><div class="text-xl md:text-2xl font-bold text-gray-800" id="totalProjectCount">0</div></div>
                    <div class="h-6 w-px bg-gray-200"></div>
                    <div class="text-left"><div class="text-[10px] md:text-xs text-gray-500 font-medium">当前筛选</div><div class="text-xl md:text-2xl font-bold text-emerald-600" id="filteredCount">0</div></div>
                </div>
                <div class="flex gap-2">
                    <div class="flex bg-white/80 backdrop-blur-sm rounded-xl border border-gray-200 p-0.5 shadow-sm">
                        <button id="cardViewBtn" class="flex items-center gap-1 px-3 py-1.5 text-xs md:text-sm font-medium rounded-lg transition-all duration-200 bg-emerald-50 text-emerald-700 shadow-sm"><svg class="w-3.5 h-3.5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg><span>卡片</span></button>
                        <button id="compactViewBtn" class="flex items-center gap-1 px-3 py-1.5 text-xs md:text-sm font-medium rounded-lg transition-all duration-200 text-gray-600 hover:bg-gray-100"><svg class="w-3.5 h-3.5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M4 6h16M4 12h16M4 18h16" /></svg><span>精简列表</span></button>
                    </div>
                    <button id="addProjectBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs md:text-sm px-3 py-1.5 rounded-xl shadow-sm flex items-center gap-1 transition"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg><span class="hidden xs:inline">新增项目</span></button>
                </div>
            </div>
        </div>

        <!-- 搜索栏 -->
        <div class="mb-5 flex flex-col sm:flex-row gap-2 items-stretch sm:items-center justify-between">
            <div class="relative flex-1 w-full"><div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><svg class="h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" /></svg></div><input type="text" id="searchInput" placeholder="搜索项目名称、作者、描述、技术栈..." class="block w-full pl-9 pr-3 py-2.5 border border-gray-200 rounded-xl bg-white/90 shadow-sm focus:ring-2 focus:ring-emerald-500/30 focus:border-emerald-400 transition-all text-sm"></div>
            <div class="text-[11px] text-gray-400 bg-white/50 px-3 py-1.5 rounded-full inline-flex items-center justify-center gap-1">🔍 模糊匹配 · 实时过滤</div>
        </div>

        <!-- 卡片视图 -->
        <div id="cardsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 auto-rows-fr"></div>
        <!-- 精简列表视图 -->
        <div id="compactContainer" class="hidden space-y-3"></div>
        <!-- 空状态 -->
        <div id="emptyState" class="hidden text-center py-12 flex flex-col items-center justify-center bg-white/40 rounded-2xl mt-5 backdrop-blur-sm">
            <div class="bg-gray-100 rounded-full p-3 mb-2"><svg class="h-8 w-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg></div>
            <p class="text-gray-500 font-medium">没有找到匹配的项目</p><p class="text-gray-400 text-xs mt-1">尝试调整关键词或清空筛选</p>
            <button id="resetSearchBtnEmpty" class="mt-3 text-sm bg-emerald-50 text-emerald-700 px-4 py-1.5 rounded-full hover:bg-emerald-100 transition">清空筛选</button>
        </div>
        <footer class="mt-12 pt-5 border-t border-gray-200/60 text-center text-[10px] md:text-xs text-gray-400">📁 完整CURD · 数据保存至浏览器本地</footer>
    </div>

    <!-- 模态框（新增/编辑） -->
    <div id="projectModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 modal-backdrop transition-all" style="display: none;">
        <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center"><h3 id="modalTitle" class="text-xl font-bold text-gray-800">新增项目</h3><button id="closeModalBtn" class="text-gray-400 hover:text-gray-600">&times;</button></div>
            <form id="projectForm" class="p-6 space-y-4">
                <input type="hidden" id="editId" value="">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">项目名称 *</label><input type="text" id="projName" required class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-emerald-500 focus:border-emerald-500"></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">作者 *</label><input type="text" id="projAuthor" required class="w-full border border-gray-300 rounded-lg px-3 py-2"></div>
                </div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">描述</label><textarea id="projDesc" rows="2" class="w-full border border-gray-300 rounded-lg px-3 py-2"></textarea></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">其他信息 (技术栈/版本等)</label><input type="text" id="projOther" class="w-full border border-gray-300 rounded-lg px-3 py-2"></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">仓库地址</label><input type="url" id="projRepo" class="w-full border border-gray-300 rounded-lg px-3 py-2" placeholder="https://..."></div>
                    <div><label class="block text-sm font-medium text-gray-700 mb-1">测试环境URL</label><input type="url" id="projTest" class="w-full border border-gray-300 rounded-lg px-3 py-2" placeholder="https://test..."></div>
                </div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">正式环境URL</label><input type="url" id="projProd" class="w-full border border-gray-300 rounded-lg px-3 py-2" placeholder="https://..."></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">标签 (用逗号分隔)</label><input type="text" id="projTags" class="w-full border border-gray-300 rounded-lg px-3 py-2" placeholder="前端, 营销, 自动化"></div>
                <div class="flex justify-end gap-3 pt-4"><button type="button" id="cancelModalBtn" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">取消</button><button type="submit" class="px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700">保存</button></div>
            </form>
        </div>
    </div>

    <script>
        // 默认初始数据
        const defaultProjects = [
            { id:1, name:"营销自动化平台", repoUrl:"https://github.com/company/marketing-automation", testUrl:"https://test-marketing.insight.cn", prodUrl:"https://marketing.insight.cn", author:"陈雅琳", otherInfo:"⚙️ Next.js + NestJS · 多渠道触达 · 更新 2025-02", description:"全渠道营销自动化引擎，支持邮件/SMS/企微集成", tags:["营销","自动化"] },
            { id:2, name:"库存智能管理系统", repoUrl:"https://github.com/company/inventory-master", testUrl:"https://test-inventory.insight.cn", prodUrl:"https://inventory.insight.cn", author:"张明远", otherInfo:"📦 Spring Boot + Redis + React · 实时预警 v3.1", description:"多仓实时库存追踪，预测补货与智能调拨", tags:["库存","IoT"] },
            { id:3, name:"员工自助服务门户", repoUrl:"https://github.com/company/hr-portal", testUrl:"https://test-hr.insight.cn", prodUrl:"https://hr.insight.cn", author:"李心怡", otherInfo:"👥 Vue3 + .NET 8 · 工资单/假期/审批流 · SSO", description:"一体化HR服务台，覆盖入职、考勤与福利申请", tags:["HR","Vue"] },
            { id:4, name:"API 网关与控制台", repoUrl:"https://github.com/company/api-gateway-console", testUrl:"https://test-gateway.insight.cn", prodUrl:"https://gateway.insight.cn", author:"王旭东", otherInfo:"🌐 Go + Envoy + gRPC · 限流/鉴权/监控", description:"统一流量入口，服务治理与可视化路由管理", tags:["网关","云原生"] },
            { id:5, name:"数据分析平台 (BI)", repoUrl:"https://github.com/company/bi-dashboard", testUrl:"https://test-bi.insight.cn", prodUrl:"https://bi.insight.cn", author:"周敏", otherInfo:"📊 Apache Superset + Python FastAPI · 自助报表", description:"企业级BI看板，连接数仓支持动态下钻", tags:["BI","大数据"] },
            { id:6, name:"项目协同工作台", repoUrl:"https://github.com/company/team-collab", testUrl:"https://test-collab.insight.cn", prodUrl:"https://collab.insight.cn", author:"赵一航", otherInfo:"🤝 React + Node + MongoDB · 任务/Gantt · 飞书", description:"研发全生命周期协同，OKR与迭代追踪", tags:["协作","敏捷"] }
        ];

        let projects = [];          // 内存数据
        let currentView = 'card';
        let currentFilterText = '';

        // DOM 元素
        const cardsContainer = document.getElementById('cardsContainer');
        const compactContainer = document.getElementById('compactContainer');
        const searchInput = document.getElementById('searchInput');
        const emptyStateDiv = document.getElementById('emptyState');
        const totalCountSpan = document.getElementById('totalProjectCount');
        const filteredCountSpan = document.getElementById('filteredCount');
        const resetBtnEmpty = document.getElementById('resetSearchBtnEmpty');
        const cardViewBtn = document.getElementById('cardViewBtn');
        const compactViewBtn = document.getElementById('compactViewBtn');
        const addProjectBtn = document.getElementById('addProjectBtn');
        const modal = document.getElementById('projectModal');
        const modalTitle = document.getElementById('modalTitle');
        const projectForm = document.getElementById('projectForm');
        const editIdInput = document.getElementById('editId');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const cancelModalBtn = document.getElementById('cancelModalBtn');

        // 辅助函数
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
        function formatShortUrl(url, maxLen=35) { if(!url) return ''; try { let u = new URL(url); let s = u.hostname + (u.pathname!='/'?u.pathname:''); return s.length>maxLen?s.substring(0,maxLen)+'…':s; } catch(e) { let raw=url.replace(/^https?:\/\//,''); return raw.length>maxLen?raw.substring(0,maxLen)+'…':raw; } }
        
        // 加载/存储 localStorage
        function loadProjects() {
            const stored = localStorage.getItem('project_asset_hub');
            if(stored) { projects = JSON.parse(stored); }
            else { projects = JSON.parse(JSON.stringify(defaultProjects)); saveProjects(); }
        }
        function saveProjects() { localStorage.setItem('project_asset_hub', JSON.stringify(projects)); }

        // CRUD 操作
        function addProject(project) { let newId = projects.length?Math.max(...projects.map(p=>p.id))+1:1; projects.push({...project, id:newId, tags: project.tags||[] }); saveProjects(); refreshUI(); }
        function updateProject(id, updated) { const index = projects.findIndex(p=>p.id==id); if(index!==-1){ projects[index]={...projects[index], ...updated, id}; saveProjects(); refreshUI(); } }
        function deleteProject(id) { if(confirm('确定要删除该项目吗？')){ projects = projects.filter(p=>p.id!==id); saveProjects(); refreshUI(); } }

        // 过滤
        function filterProjects(term) {
            if(!term.trim()) return [...projects];
            const lower = term.trim().toLowerCase();
            return projects.filter(p => p.name.toLowerCase().includes(lower) || p.author.toLowerCase().includes(lower) || (p.description && p.description.toLowerCase().includes(lower)) || (p.otherInfo && p.otherInfo.toLowerCase().includes(lower)) || (p.tags && p.tags.some(t=>t.toLowerCase().includes(lower))) || (p.repoUrl && p.repoUrl.toLowerCase().includes(lower)) || (p.prodUrl && p.prodUrl.toLowerCase().includes(lower)) || (p.testUrl && p.testUrl.toLowerCase().includes(lower)));
        }

        // 渲染卡片 (增加编辑删除按钮)
        function renderDetailCard(project) {
            const repoLink = project.repoUrl ? `<a href="${project.repoUrl}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 text-indigo-600 hover:text-indigo-800 text-xs md:text-sm bg-indigo-50/60 px-2 py-1 rounded-md break-all"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg><span class="truncate">${escapeHtml(formatShortUrl(project.repoUrl,40))}</span></a>` : `<span class="text-gray-400 text-xs">🔗 无仓库</span>`;
            const testLink = project.testUrl ? `<a href="${project.testUrl}" target="_blank" class="inline-flex items-center gap-1 text-amber-600 hover:text-amber-800 text-xs md:text-sm bg-amber-50/60 px-2 py-1 rounded-md break-all"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span class="truncate">${escapeHtml(formatShortUrl(project.testUrl,30))}</span></a>` : `<span class="text-gray-400 text-xs">🚧 未配置</span>`;
            const prodLink = project.prodUrl ? `<a href="${project.prodUrl}" target="_blank" class="inline-flex items-center gap-1 text-emerald-600 hover:text-emerald-800 text-xs md:text-sm bg-emerald-50/60 px-2 py-1 rounded-md break-all"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M5 13l4 4L19 7"></path></svg><span class="truncate">${escapeHtml(formatShortUrl(project.prodUrl,30))}</span></a>` : `<span class="text-gray-400 text-xs">🔒 未配置</span>`;
            const tagBadges = project.tags?.length ? `<div class="flex flex-wrap gap-1.5 mt-1">${project.tags.map(t=>`<span class="text-[10px] md:text-xs font-medium bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">${escapeHtml(t)}</span>`).join('')}</div>` : '';
            return `<div class="bg-white/90 backdrop-blur-sm rounded-xl md:rounded-2xl border border-gray-200/80 shadow-sm overflow-hidden flex flex-col h-full transition-all duration-200 card-hover animate-fade-in relative">
                        <div class="absolute top-2 right-2 flex gap-1 z-10"><button class="edit-project p-1.5 bg-white/80 rounded-full shadow-sm hover:bg-gray-100" data-id="${project.id}" title="编辑"><svg class="w-3.5 h-3.5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg></button><button class="delete-project p-1.5 bg-white/80 rounded-full shadow-sm hover:bg-red-50" data-id="${project.id}" title="删除"><svg class="w-3.5 h-3.5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button></div>
                        <div class="p-3 md:p-5 pb-2 md:pb-3 border-b border-gray-100">
                            <div class="flex justify-between items-start gap-1"><h3 class="text-base md:text-xl font-bold text-gray-800 pr-12">${escapeHtml(project.name)}</h3><span class="bg-gray-50 rounded-full px-1.5 py-0.5 text-[10px] md:text-xs text-gray-500">#${project.id}</span></div>
                            <div class="flex items-center gap-1 mt-1.5 text-xs md:text-sm text-gray-600"><svg class="w-3 h-3 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg><span class="font-medium">${escapeHtml(project.author)}</span></div>
                            <p class="text-xs md:text-sm text-gray-500 mt-1.5 leading-relaxed">📋 ${escapeHtml(project.description||'')}</p>${tagBadges}
                        </div>
                        <div class="px-3 md:px-5 pt-2 pb-2 space-y-2 flex-1"><div><div class="text-[10px] md:text-xs font-semibold text-gray-500 mb-0.5">📂 代码仓库</div>${repoLink}</div><div class="grid grid-cols-1 xs:grid-cols-2 gap-2"><div class="bg-amber-50/30 rounded-lg p-1.5 md:p-2 border border-amber-100/50"><div class="text-[10px] md:text-xs font-medium text-amber-700 mb-0.5">🧪 测试环境</div>${testLink}</div><div class="bg-emerald-50/30 rounded-lg p-1.5 md:p-2 border border-emerald-100/50"><div class="text-[10px] md:text-xs font-medium text-emerald-700 mb-0.5">🚀 正式环境</div>${prodLink}</div></div><div class="mt-1 pt-1.5 border-t border-gray-100 bg-gray-50/50 rounded-lg p-2 text-[10px] md:text-xs leading-relaxed">📌 ${escapeHtml(project.otherInfo||'')}</div></div>
                        <div class="px-3 md:px-5 pb-3 pt-0 text-right text-[10px] text-gray-400">🔗 点击链接新窗口访问</div>
                    </div>`;
        }

        // 精简列表 (同样加编辑删除按钮)
        function renderCompactItem(project) {
            const repoBtn = project.repoUrl ? `<a href="${project.repoUrl}" target="_blank" class="flex items-center justify-center gap-1 text-indigo-600 bg-indigo-50/70 hover:bg-indigo-100 py-1.5 rounded-lg text-xs w-full"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg><span class="hidden sm:inline">仓库</span></a>` : `<span class="flex items-center justify-center gap-1 text-gray-400 bg-gray-100 py-1.5 rounded-lg text-xs w-full"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg><span class="hidden sm:inline">无仓库</span></span>`;
            const testBtn = project.testUrl ? `<a href="${project.testUrl}" target="_blank" class="flex items-center justify-center gap-1 text-amber-600 bg-amber-50/70 hover:bg-amber-100 py-1.5 rounded-lg text-xs w-full"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span class="hidden sm:inline">测试</span></a>` : `<span class="flex items-center justify-center gap-1 text-gray-400 bg-gray-100 py-1.5 rounded-lg text-xs w-full"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span class="hidden sm:inline">无测试</span></span>`;
            const prodBtn = project.prodUrl ? `<a href="${project.prodUrl}" target="_blank" class="flex items-center justify-center gap-1 text-emerald-600 bg-emerald-50/70 hover:bg-emerald-100 py-1.5 rounded-lg text-xs w-full"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M5 13l4 4L19 7"></path></svg><span class="hidden sm:inline">正式</span></a>` : `<span class="flex items-center justify-center gap-1 text-gray-400 bg-gray-100 py-1.5 rounded-lg text-xs w-full"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M5 13l4 4L19 7"></path></svg><span class="hidden sm:inline">未配置</span></span>`;
            let shortInfo = (project.otherInfo||'').substring(0,60);
            return `<div class="bg-white/80 backdrop-blur-sm rounded-xl border border-gray-200 shadow-sm p-3 md:p-4 compact-item-hover transition animate-fade-in relative">
                        <div class="absolute top-2 right-2 flex gap-1"><button class="edit-project p-1 bg-white rounded-full shadow-sm hover:bg-gray-100" data-id="${project.id}" title="编辑"><svg class="w-3 h-3 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg></button><button class="delete-project p-1 bg-white rounded-full shadow-sm hover:bg-red-50" data-id="${project.id}" title="删除"><svg class="w-3 h-3 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button></div>
                        <div class="flex flex-col gap-2 pr-14">
                            <div class="flex flex-wrap items-baseline justify-between gap-1"><div class="flex items-center gap-2 flex-wrap"><h3 class="text-sm md:text-base font-bold text-gray-800">${escapeHtml(project.name)}</h3><span class="text-[10px] bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded-full">#${project.id}</span></div><div class="flex items-center gap-1 text-xs text-gray-500"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg><span>${escapeHtml(project.author)}</span></div></div>
                            <div class="flex flex-wrap gap-1 mt-0 sm:hidden">${project.tags?.slice(0,2).map(t=>`<span class="text-[9px] bg-gray-100 text-gray-600 px-1.5 py-0.2 rounded-full">${escapeHtml(t)}</span>`).join('')}<span class="text-[10px] text-gray-400 truncate">${escapeHtml(shortInfo)}</span></div>
                            <div class="hidden sm:block text-[11px] text-gray-400 truncate">📄 ${escapeHtml((project.description||'').substring(0,80))}</div>
                            <div class="grid grid-cols-3 gap-2 mt-1">${repoBtn}${testBtn}${prodBtn}</div>
                        </div>
                    </div>`;
        }

        // 刷新视图
        function refreshUI() {
            const filtered = filterProjects(currentFilterText);
            totalCountSpan.innerText = projects.length;
            filteredCountSpan.innerText = filtered.length;
            if(filtered.length===0){ emptyStateDiv.classList.remove('hidden'); cardsContainer.classList.add('hidden'); compactContainer.classList.add('hidden'); return; }
            emptyStateDiv.classList.add('hidden');
            if(currentView === 'card'){
                cardsContainer.classList.remove('hidden'); compactContainer.classList.add('hidden');
                cardsContainer.innerHTML = filtered.map(p=>renderDetailCard(p)).join('');
                attachCardEvents();
            } else {
                cardsContainer.classList.add('hidden'); compactContainer.classList.remove('hidden');
                compactContainer.innerHTML = filtered.map(p=>renderCompactItem(p)).join('');
                attachCompactEvents();
            }
        }
        function attachCardEvents(){ document.querySelectorAll('.edit-project').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); openEditModal(parseInt(btn.dataset.id)); })); document.querySelectorAll('.delete-project').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); deleteProject(parseInt(btn.dataset.id)); })); }
        function attachCompactEvents(){ document.querySelectorAll('.edit-project').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); openEditModal(parseInt(btn.dataset.id)); })); document.querySelectorAll('.delete-project').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); deleteProject(parseInt(btn.dataset.id)); })); }

        // 模态框逻辑
        function openModal(editId=null){
            modal.style.display = 'flex';
            if(editId){
                modalTitle.innerText = '编辑项目';
                const proj = projects.find(p=>p.id===editId);
                if(proj){
                    document.getElementById('editId').value = proj.id;
                    document.getElementById('projName').value = proj.name;
                    document.getElementById('projAuthor').value = proj.author;
                    document.getElementById('projDesc').value = proj.description||'';
                    document.getElementById('projOther').value = proj.otherInfo||'';
                    document.getElementById('projRepo').value = proj.repoUrl||'';
                    document.getElementById('projTest').value = proj.testUrl||'';
                    document.getElementById('projProd').value = proj.prodUrl||'';
                    document.getElementById('projTags').value = (proj.tags||[]).join(', ');
                }
            } else {
                modalTitle.innerText = '新增项目';
                document.getElementById('editId').value = '';
                projectForm.reset();
            }
        }
        function closeModal(){ modal.style.display = 'none'; }
        function openEditModal(id){ openModal(id); }
        
        projectForm.addEventListener('submit', (e)=>{
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const tagsRaw = document.getElementById('projTags').value;
            const tags = tagsRaw.split(',').map(t=>t.trim()).filter(t=>t);
            const projectData = {
                name: document.getElementById('projName').value.trim(),
                author: document.getElementById('projAuthor').value.trim(),
                description: document.getElementById('projDesc').value.trim(),
                otherInfo: document.getElementById('projOther').value.trim(),
                repoUrl: document.getElementById('projRepo').value.trim(),
                testUrl: document.getElementById('projTest').value.trim(),
                prodUrl: document.getElementById('projProd').value.trim(),
                tags: tags
            };
            if(!projectData.name || !projectData.author){ alert('请填写项目名称和作者'); return; }
            if(id){ updateProject(parseInt(id), projectData); }
            else { addProject(projectData); }
            closeModal();
        });
        addProjectBtn.addEventListener('click',()=>openModal());
        closeModalBtn.addEventListener('click',closeModal);
        cancelModalBtn.addEventListener('click',closeModal);
        modal.addEventListener('click',(e)=>{ if(e.target===modal) closeModal(); });

        // 视图切换与搜索
        searchInput.addEventListener('input', (e)=>{ currentFilterText=e.target.value; refreshUI(); });
        resetBtnEmpty.addEventListener('click', ()=>{ searchInput.value=''; currentFilterText=''; refreshUI(); });
        cardViewBtn.addEventListener('click',()=>{ currentView='card'; cardViewBtn.classList.add('bg-emerald-50','text-emerald-700','shadow-sm'); cardViewBtn.classList.remove('text-gray-600','hover:bg-gray-100'); compactViewBtn.classList.remove('bg-emerald-50','text-emerald-700','shadow-sm'); compactViewBtn.classList.add('text-gray-600','hover:bg-gray-100'); refreshUI(); });
        compactViewBtn.addEventListener('click',()=>{ currentView='compact'; compactViewBtn.classList.add('bg-emerald-50','text-emerald-700','shadow-sm'); compactViewBtn.classList.remove('text-gray-600','hover:bg-gray-100'); cardViewBtn.classList.remove('bg-emerald-50','text-emerald-700','shadow-sm'); cardViewBtn.classList.add('text-gray-600','hover:bg-gray-100'); refreshUI(); });

        loadProjects();
        refreshUI();
    </script>
</body>
</html>
